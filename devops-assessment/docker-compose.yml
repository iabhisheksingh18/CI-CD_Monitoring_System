services:
  mongo:
    image: mongo:7
    container_name: cicd-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: springboot-backend
    ports:
      - "8080:8080"
    environment:
      - DEBUG=1
      - MONGODB_URI=mongodb://mongo:27017/cicd_monitoring
      - JWT_SECRET=change-this-local-development-secret-before-production
    depends_on:
      - mongo
      - ai-service

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080
    ports:
      - "80:80"
    depends_on:
      - backend

  ai-service:
    build: ./ai-service
    container_name: fastapi-ai
    ports:
      - "8000:8000"
    env_file:
      - ./ai-service/.env
    environment:
      - PYTHONUNBUFFERED=1

volumes:
  mongo-data:

# CI pipeline for Docker build and push

name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          # Sanitize username to remove potential newlines
          CLEAN_USERNAME=$(echo "$DOCKER_USERNAME" | tr -d '\n\r')
          docker build -t "$CLEAN_USERNAME/devops-backend-java:latest" ./backend
          docker push "$CLEAN_USERNAME/devops-backend-java:latest"

      - name: Build and push frontend image
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          # Sanitize username to remove potential newlines
          CLEAN_USERNAME=$(echo "$DOCKER_USERNAME" | tr -d '\n\r')
          docker build -t "$CLEAN_USERNAME/devops-frontend:latest" ./frontend
          docker push "$CLEAN_USERNAME/devops-frontend:latest"
